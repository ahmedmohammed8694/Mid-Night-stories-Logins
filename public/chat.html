<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Room — Midnight Stories</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Chat Layout */
    .chat-layout {
      display: flex;
      height: calc(100vh - 70px);
      background: var(--bg-body);
      border-top: 1px solid var(--border-card);
    }

    /* Left Pane: Conversations */
    .conversations-pane {
      width: 320px;
      border-right: 1px solid var(--border-card);
      display: flex;
      flex-direction: column;
      background: rgba(18, 18, 18, 0.4);
      backdrop-filter: blur(12px);
    }
    .conversations-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-card);
    }
    .conversations-header h2 {
      font-family: var(--font-display, 'Fraunces', serif);
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: white;
    }
    .chat-tabs {
      display: flex;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 8px;
    }
    .chat-tab {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 20px;
      transition: all var(--transition-base);
    }
    .chat-tab:hover {
      color: white;
    }
    .chat-tab.active {
      background: rgba(255,255,255,0.08);
      color: var(--page-accent, #a78bfa);
    }
    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all var(--transition-base);
      margin-bottom: 6px;
      border: 1px solid transparent;
    }
    .conv-item:hover {
      background: rgba(255,255,255,0.03);
    }
    .conv-item.active {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .conv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary, #5c6ac4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      overflow: hidden;
      flex-shrink: 0;
    }
    .conv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .conv-info {
      flex: 1;
      min-width: 0;
    }
    .conv-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-preview {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .conv-badge {
      background: var(--page-accent, #a78bfa);
      color: #000;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 5px;
      text-transform: uppercase;
    }

    /* Right Pane: Active Chat */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 10, 0.2);
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(18, 18, 18, 0.3);
      backdrop-filter: blur(8px);
    }
    .chat-header-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-name {
      font-family: var(--font-display, 'Fraunces', serif);
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
    }
    .chat-header-tag {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    /* Message Bubble Styles */
    .msg-row {
      display: flex;
      width: 100%;
    }
    .msg-row.sent {
      justify-content: flex-end;
    }
    .msg-row.received {
      justify-content: flex-start;
    }
    .msg-bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      position: relative;
    }
    .msg-row.sent .msg-bubble {
      background: var(--page-gradient);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px var(--page-accent-glow);
    }
    .msg-row.received .msg-bubble {
      background: rgba(255, 255, 255, 0.06);
      color: white;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .msg-time {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 5px;
      text-align: right;
      display: block;
    }

    /* Actions/Inputs Bottom Bar */
    .chat-input-bar {
      padding: 20px 24px;
      border-top: 1px solid var(--border-card);
      background: rgba(18, 18, 18, 0.4);
    }
    .chat-form {
      display: flex;
      gap: 12px;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-card);
      border-radius: 30px;
      padding: 12px 20px;
      color: white;
      font-family: inherit;
      outline: none;
      font-size: 0.95rem;
      transition: all var(--transition-base);
    }
    .chat-input:focus {
      border-color: var(--page-accent);
      box-shadow: 0 0 15px var(--page-accent-glow);
    }
    
    /* Request Banners */
    .request-banner {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      text-align: center;
    }
    .request-banner-title {
      font-weight: bold;
      color: #f59e0b;
      font-size: 1.1rem;
    }
    .request-banner-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      max-width: 400px;
    }
    
    /* Empty State */
    .empty-chat-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      gap: 15px;
    }
    .empty-chat-icon {
      font-size: 3rem;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="page-wrapper" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
    <!-- Header dynamically injected -->
    <header class="header"></header>

    <main class="chat-layout">
      <!-- Left Pane: Conversations -->
      <aside class="conversations-pane">
        <div class="conversations-header">
          <h2>Direct Messages</h2>
          <div class="chat-tabs">
            <span class="chat-tab active" id="tabActiveChats">Chats</span>
            <span class="chat-tab" id="tabRequestsChats">Requests <span id="requestsCount" style="display: none; background: #f59e0b; color: black; font-size: 0.75rem; border-radius: 50%; width: 18px; height: 18px; line-height: 18px; text-align: center; font-weight: bold; margin-left: 4px;">0</span></span>
          </div>
        </div>
        <div class="conversations-list" id="convList">
          <p style="text-align: center; opacity: 0.5; padding: 20px;">Loading conversations...</p>
        </div>
      </aside>

      <!-- Right Pane: Active Chat -->
      <section class="chat-pane" id="chatPane">
        <div class="empty-chat-state">
          <div class="empty-chat-icon">💬</div>
          <p>Select a conversation to start messaging</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');

    if (!token || !currentUser) {
      window.location.href = '/login.html';
    }

    let allConversations = [];
    let activeConversation = null;
    let activeTab = 'active'; // 'active' or 'requests'
    let messagePollInterval = null;

    // Load URL parameters (for redirection from profile)
    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get('userId');

    async function loadConversations() {
      try {
        const res = await fetch('/api/conversations', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        allConversations = await res.json();
        
        // Update requests count
        const requests = allConversations.filter(c => c.status === 'pending' && c.initiated_by_id !== currentUser.id);
        const badge = document.getElementById('requestsCount');
        if (requests.length > 0) {
          badge.textContent = requests.length;
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
        }

        renderConversations();

        // If targetUserId was specified, try to find or open that chat!
        if (targetUserId) {
          // Clear query params to prevent re-opening on reload
          window.history.replaceState({}, document.title, "/chat.html");
          openUserChat(parseInt(targetUserId));
        }
      } catch (err) {
        console.error('Failed to load conversations:', err);
      }
    }

    function renderConversations() {
      const container = document.getElementById('convList');
      container.innerHTML = '';

      let filtered = [];
      if (activeTab === 'active') {
        // Show accepted ones, or pending ones initiated by current user
        filtered = allConversations.filter(c => c.status === 'accepted' || (c.status === 'pending' && c.initiated_by_id === currentUser.id));
      } else {
        // Show pending requests received from others
        filtered = allConversations.filter(c => c.status === 'pending' && c.initiated_by_id !== currentUser.id);
      }

      if (filtered.length === 0) {
        container.innerHTML = `<p style="text-align: center; opacity: 0.5; padding: 20px;">No ${activeTab === 'active' ? 'chats' : 'requests'} found.</p>`;
        return;
      }

      filtered.forEach(c => {
        const isActive = activeConversation && activeConversation.id === c.id;
        const nameChar = c.other_name ? c.other_name.charAt(0).toUpperCase() : '👤';
        const avatarHtml = c.other_pic 
          ? `<img src="${c.other_pic}" alt="${c.other_name}">` 
          : nameChar;
        
        const preview = c.last_message || 'No messages yet';
        const statusBadge = c.status === 'pending' && c.initiated_by_id === currentUser.id 
          ? `<span class="conv-badge">Sent</span>` 
          : '';

        const item = document.createElement('div');
        item.className = `conv-item ${isActive ? 'active' : ''}`;
        item.onclick = () => selectConversation(c);
        item.innerHTML = `
          <div class="conv-avatar">${avatarHtml}</div>
          <div class="conv-info">
            <div class="conv-name" style="display:flex; align-items:center; justify-content:space-between;">
              <span>${escapeHtml(c.other_name)}</span>
              ${statusBadge}
            </div>
            <div class="conv-preview">${escapeHtml(preview)}</div>
          </div>
        `;
        container.appendChild(item);
      });
    }

    async function selectConversation(conv) {
      activeConversation = conv;
      renderConversations();
      
      // Setup right pane loading state
      const chatPane = document.getElementById('chatPane');
      chatPane.innerHTML = `
        <div style="flex:1; display:flex; align-items:center; justify-content:center;">
          <p>Loading messages...</p>
        </div>
      `;

      // Stop previous polling
      if (messagePollInterval) clearInterval(messagePollInterval);

      await loadMessages();

      // Start short polling (fetch every 3 seconds for new messages)
      messagePollInterval = setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!activeConversation) return;

      try {
        const res = await fetch(`/api/conversations/${activeConversation.id}/messages`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        // Refresh conversation status in memory
        activeConversation.status = data.conversation.status;

        renderChatWindow(data.conversation, data.messages);
      } catch (err) {
        console.error('Failed to load messages:', err);
      }
    }

    function renderChatWindow(conversation, messages) {
      const chatPane = document.getElementById('chatPane');
      chatPane.innerHTML = '';

      // 1. Header
      const headerDiv = document.createElement('div');
      headerDiv.className = 'chat-header';
      headerDiv.innerHTML = `
        <div class="chat-header-user">
          <div class="conv-avatar" style="width: 40px; height: 40px; cursor: pointer;" onclick="window.location.href='/profile.html?id=${encodeURIComponent(conversation.other_user_id || conversation.other_id)}'">
            ${conversation.other_pic ? `<img src="${conversation.other_pic}">` : (conversation.other_name ? conversation.other_name.charAt(0).toUpperCase() : '👤')}
          </div>
          <div>
            <div class="chat-header-name" style="cursor: pointer;" onclick="window.location.href='/profile.html?id=${encodeURIComponent(conversation.other_user_id || conversation.other_id)}'">${escapeHtml(conversation.other_name)}</div>
            <div class="chat-header-tag">${escapeHtml(conversation.other_user_id || `ID: ${conversation.other_id}`)}</div>
          </div>
        </div>
        <div>
          <button class="btn btn--secondary btn--sm" onclick="declineChat(${conversation.id})" style="border-color: rgba(255,94,94,0.3); color: #ff5e5e;">Delete Chat</button>
        </div>
      `;
      chatPane.appendChild(headerDiv);

      // 2. Messages Area
      const messagesArea = document.createElement('div');
      messagesArea.className = 'messages-area';
      
      if (messages.length === 0) {
        messagesArea.innerHTML = `<p style="text-align: center; opacity: 0.4; padding: 20px;">No messages yet. Say hello!</p>`;
      } else {
        messages.forEach(m => {
          const isSent = m.sender_id === currentUser.id;
          const row = document.createElement('div');
          row.className = `msg-row ${isSent ? 'sent' : 'received'}`;
          row.innerHTML = `
            <div class="msg-bubble">
              <div>${escapeHtml(m.body)}</div>
              <span class="msg-time">${new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
          `;
          messagesArea.appendChild(row);
        });
      }
      chatPane.appendChild(messagesArea);
      
      // Auto-scroll messages area to bottom
      setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 50);

      // 3. Request Banner or Input bar
      if (conversation.status === 'pending') {
        const isInitiator = conversation.initiated_by_id === currentUser.id;
        const requestDiv = document.createElement('div');
        
        if (isInitiator) {
          requestDiv.className = 'request-banner';
          requestDiv.innerHTML = `
            <div class="request-banner-title">Waiting for Acceptance</div>
            <div class="request-banner-desc">Your chat request has been sent. You will be able to message each other once they accept your chat.</div>
          `;
        } else {
          requestDiv.className = 'request-banner';
          requestDiv.innerHTML = `
            <div class="request-banner-title">Chat Request</div>
            <div class="request-banner-desc">${escapeHtml(conversation.other_name)} wants to communicate with you. Accept this request to chat.</div>
            <div style="display: flex; gap: 12px;">
              <button class="btn btn--primary btn--sm" onclick="acceptChat(${conversation.id})">Accept Request</button>
              <button class="btn btn--secondary btn--sm" onclick="declineChat(${conversation.id})" style="border-color: rgba(255,94,94,0.3); color: #ff5e5e;">Decline</button>
            </div>
          `;
        }
        chatPane.appendChild(requestDiv);
      } else {
        // Active chat input bar
        const inputBar = document.createElement('div');
        inputBar.className = 'chat-input-bar';
        inputBar.innerHTML = `
          <form class="chat-form" onsubmit="event.preventDefault(); sendMessage();">
            <input type="text" id="chatMessageInput" class="chat-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="btn btn--primary" style="border-radius: 30px; padding: 10px 24px;">Send</button>
          </form>
        `;
        chatPane.appendChild(inputBar);
        setTimeout(() => {
          const input = document.getElementById('chatMessageInput');
          if (input) input.focus();
        }, 50);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatMessageInput');
      const body = input.value.trim();
      if (!body || !activeConversation) return;

      input.value = '';

      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            receiver_id: activeConversation.other_id,
            body
          })
        });

        const data = await res.json();
        if (res.ok) {
          // If conversation ID was null (placeholder), refresh list and select it
          if (activeConversation.id === null) {
            await loadConversations();
            const matching = allConversations.find(c => c.other_id === activeConversation.other_id);
            if (matching) {
              selectConversation(matching);
            }
          } else {
            loadMessages();
            loadConversations();
          }
        } else {
          alert(data.error || 'Failed to send message.');
        }
      } catch (err) {
        alert('An error occurred.');
      }
    }

    async function acceptChat(convId) {
      try {
        const res = await fetch(`/api/conversations/${convId}/accept`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          await loadConversations();
          if (activeConversation && activeConversation.id === convId) {
            activeConversation.status = 'accepted';
            loadMessages();
          }
        } else {
          const data = await res.json();
          alert(data.error);
        }
      } catch (err) {
        alert('An error occurred.');
      }
    }

    async function declineChat(convId) {
      if (!confirm('Are you sure you want to decline or delete this chat? This will remove the request and all messages.')) return;
      
      try {
        const res = await fetch(`/api/conversations/${convId}/decline`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          activeConversation = null;
          document.getElementById('chatPane').innerHTML = `
            <div class="empty-chat-state">
              <div class="empty-chat-icon">💬</div>
              <p>Select a conversation to start messaging</p>
            </div>
          `;
          if (messagePollInterval) clearInterval(messagePollInterval);
          loadConversations();
        } else {
          const data = await res.json();
          alert(data.error);
        }
      } catch (err) {
        alert('An error occurred.');
      }
    }

    async function openUserChat(userId) {
      const existing = allConversations.find(c => c.other_id === userId);
      if (existing) {
        selectConversation(existing);
        return;
      }

      try {
        const res = await fetch(`/api/users/${userId}`);
        if (!res.ok) return;
        const otherUser = await res.json();

        const placeholderConv = {
          id: null,
          other_id: otherUser.id,
          other_user_id: otherUser.user_id,
          other_name: otherUser.full_name,
          other_pic: otherUser.profile_pic,
          other_bio: otherUser.bio,
          status: 'pending',
          initiated_by_id: currentUser.id
        };

        activeConversation = placeholderConv;
        renderChatWindow(placeholderConv, []);
      } catch (err) {
        console.error('Failed to initiate user chat:', err);
      }
    }

    document.getElementById('tabActiveChats').addEventListener('click', () => {
      activeTab = 'active';
      document.getElementById('tabActiveChats').classList.add('active');
      document.getElementById('tabRequestsChats').classList.remove('active');
      renderConversations();
    });

    document.getElementById('tabRequestsChats').addEventListener('click', () => {
      activeTab = 'requests';
      document.getElementById('tabActiveChats').classList.remove('active');
      document.getElementById('tabRequestsChats').classList.add('active');
      renderConversations();
    });

    loadConversations();
  </script>
</body>
</html>
