<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat | Midnight Stories</title>
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Chat Layout */
    .chat-layout {
      display: flex;
      height: calc(100vh - var(--header-height, 72px));
      margin-top: var(--header-height, 72px);
      background: var(--bg-body);
      border-top: 1px solid var(--border-card);
    }

    /* Left Pane: Conversations */
    .conversations-pane {
      width: 320px;
      border-right: 1px solid var(--border-card);
      display: flex;
      flex-direction: column;
      background: rgba(18, 18, 18, 0.4);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .conversations-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-card);
    }
    .conversations-header h2 {
      font-family: var(--font-display, 'Fraunces', serif);
      font-size: 1.3rem;
      margin-bottom: 12px;
      color: white;
    }
    .chat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 8px;
    }
    .chat-tab {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 12px;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
    }
    .chat-tab:hover {
      color: white;
    }
    .chat-tab.active {
      background: rgba(255,255,255,0.08);
      color: var(--page-accent, #a78bfa);
    }
    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all var(--transition-base);
      margin-bottom: 6px;
      border: 1px solid transparent;
    }
    .conv-item:hover {
      background: rgba(255,255,255,0.03);
    }
    .conv-item.active {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .conv-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary, #5c6ac4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      overflow: hidden;
      flex-shrink: 0;
    }
    .conv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .conv-info {
      flex: 1;
      min-width: 0;
    }
    .conv-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-preview {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .conv-badge {
      background: var(--page-accent, #a78bfa);
      color: #000;
      font-size: 0.65rem;
      font-weight: bold;
      padding: 1px 4px;
      border-radius: 6px;
      margin-left: 5px;
      text-transform: uppercase;
    }

    /* Right Pane: Active Chat */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 10, 0.2);
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(18, 18, 18, 0.3);
      backdrop-filter: blur(8px);
    }
    .chat-header-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-name {
      font-family: var(--font-display, 'Fraunces', serif);
      font-size: 1.15rem;
      font-weight: bold;
      color: white;
    }
    .chat-header-tag {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    /* Message Bubble Styles */
    .msg-row {
      display: flex;
      width: 100%;
    }
    .msg-row.sent {
      justify-content: flex-end;
    }
    .msg-row.received {
      justify-content: flex-start;
    }
    .msg-bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      position: relative;
    }
    .msg-row.sent .msg-bubble {
      background: var(--page-gradient);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px var(--page-accent-glow);
    }
    .msg-row.received .msg-bubble {
      background: rgba(255, 255, 255, 0.06);
      color: white;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .msg-time {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 5px;
      text-align: right;
      display: block;
    }

    /* Actions/Inputs Bottom Bar */
    .chat-input-bar {
      padding: 20px 24px;
      border-top: 1px solid var(--border-card);
      background: rgba(18, 18, 18, 0.4);
    }
    .chat-form {
      display: flex;
      gap: 12px;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-card);
      border-radius: 30px;
      padding: 12px 20px;
      color: white;
      font-family: inherit;
      outline: none;
      font-size: 0.95rem;
      transition: all var(--transition-base);
    }
    .chat-input:focus {
      border-color: var(--page-accent);
      box-shadow: 0 0 15px var(--page-accent-glow);
    }
    
    /* Request Banners */
    .request-banner {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      text-align: center;
    }
    .request-banner-title {
      font-weight: bold;
      color: #f59e0b;
      font-size: 1.1rem;
    }
    .request-banner-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      max-width: 400px;
    }
    
    /* Empty State */
    .empty-chat-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      gap: 15px;
    }
    .empty-chat-icon {
      font-size: 3rem;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="page-wrapper" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
    <!-- Header dynamically injected -->
    <header class="header"></header>

    <main class="chat-layout">
      <!-- Left Pane: Conversations -->
      <aside class="conversations-pane">
        <div class="conversations-header">
          <a href="/" style="display:inline-block; margin-bottom: 12px; font-size: 0.85rem; color: var(--text-secondary); text-decoration: none;">&larr; Back to Browse</a>
          <h1 style="font-size: 1.5rem; margin: 0;">Direct Messages</h1>
          <div class="chat-tabs">
            <span class="chat-tab active" id="tabActiveChats">Active</span>
            <span class="chat-tab" id="tabRequestsChats">Requests <span id="requestsCount" style="display: none; background: #f59e0b; color: black; font-size: 0.72rem; border-radius: 50%; width: 16px; height: 16px; line-height: 16px; text-align: center; font-weight: bold; margin-left: 4px;">0</span></span>
            <span class="chat-tab" id="tabSentChats">Sent</span>
            <span class="chat-tab" id="tabDeclinedChats">Declined</span>
          </div>
        </div>
        <div class="conversations-list" id="convList">
          <p style="text-align: center; opacity: 0.5; padding: 20px;">Loading conversations...</p>
        </div>
      </aside>

      <!-- Right Pane: Active Chat -->
      <section class="chat-pane" id="chatPane">
        <div class="empty-chat-state">
          <div class="empty-chat-icon">💬</div>
          <p>Select a conversation to start messaging</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');

    if (!token || !currentUser) {
      window.location.href = '/login.html';
    }

    let allConversations = [];
    let activeConversation = null;
    let activeTab = 'active'; // 'active', 'requests', 'sent', 'declined'
    let messagePollInterval = null;

    // Load URL parameters (for redirection from profile)
    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get('userId');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadConversations() {
      try {
        const res = await fetch('/api/conversations', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        allConversations = await res.json();
        
        const requests = allConversations.filter(c => c.status === 'pending' && Number(c.initiated_by_id) !== Number(currentUser.id));
        const badge = document.getElementById('requestsCount');
        if (requests.length > 0) {
          badge.textContent = requests.length;
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
        }

        renderConversations();

        if (targetUserId) {
          window.history.replaceState({}, document.title, "/chat.html");
          openUserChat(parseInt(targetUserId));
        }
      } catch (err) {
        console.error('Failed to load conversations:', err);
      }
    }

    function renderConversations() {
      const container = document.getElementById('convList');
      container.innerHTML = '';

      let filtered = [];
      if (activeTab === 'active') {
        filtered = allConversations.filter(c => c.status === 'accepted');
      } else if (activeTab === 'requests') {
        filtered = allConversations.filter(c => c.status === 'pending' && Number(c.initiated_by_id) !== Number(currentUser.id));
      } else if (activeTab === 'sent') {
        filtered = allConversations.filter(c => c.status === 'pending' && Number(c.initiated_by_id) === Number(currentUser.id));
      } else if (activeTab === 'declined') {
        filtered = allConversations.filter(c => c.status === 'declined');
      }

      if (filtered.length === 0) {
        container.innerHTML = `<p style="text-align: center; opacity: 0.5; padding: 20px;">No chats found here.</p>`;
        return;
      }

      filtered.forEach(c => {
        const isActive = activeConversation && activeConversation.id === c.id;
        const nameChar = c.other_name ? c.other_name.charAt(0).toUpperCase() : '👤';
        const avatarHtml = c.other_pic 
          ? `<img src="${c.other_pic}" alt="${c.other_name}">` 
          : nameChar;
        
        const preview = c.last_message || 'No messages yet';
        let statusBadge = '';
        if (c.status === 'pending') {
          statusBadge = Number(c.initiated_by_id) === Number(currentUser.id) 
            ? `<span class="conv-badge" style="background:#fbbf24; color:black;">Sent</span>` 
            : `<span class="conv-badge" style="background:#f59e0b; color:black;">Req</span>`;
        } else if (c.status === 'declined') {
          statusBadge = `<span class="conv-badge" style="background:#ef4444; color:white;">Declined</span>`;
        }

        const item = document.createElement('div');
        item.className = `conv-item ${isActive ? 'active' : ''}`;
        item.onclick = () => selectConversation(c);
        item.innerHTML = `
          <div class="conv-avatar">${avatarHtml}</div>
          <div class="conv-info">
            <div class="conv-name" style="display:flex; align-items:center; justify-content:space-between;">
              <span>${escapeHtml(c.other_name)}</span>
              ${statusBadge}
            </div>
            <div class="conv-preview">${escapeHtml(preview)}</div>
          </div>
        `;
        container.appendChild(item);
      });
    }

    let lastMessagesCount = 0;

    async function selectConversation(conv) {
      activeConversation = conv;
      renderConversations();
      
      // Render the structure frame once
      renderChatLayout(conv);
      lastMessagesCount = 0;

      if (messagePollInterval) clearInterval(messagePollInterval);
      await loadMessages();
      messagePollInterval = setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!activeConversation || activeConversation.id === null) return;

      try {
        const res = await fetch(`/api/conversations/${activeConversation.id}/messages`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        const mergedConv = { ...activeConversation, ...data.conversation };

        // If status changed or conversation is new, update layout widgets
        if (data.conversation.status !== activeConversation.status) {
          activeConversation.status = data.conversation.status;
          updateChatHeader(mergedConv);
          updateChatBottomBar(mergedConv);
        }

        renderMessagesOnly(data.messages);
      } catch (err) {
        console.error('Failed to load messages:', err);
      }
    }

    function renderChatLayout(conversation) {
      const chatPane = document.getElementById('chatPane');
      chatPane.innerHTML = '';

      // 1. Header Frame
      const headerDiv = document.createElement('div');
      headerDiv.className = 'chat-header';
      headerDiv.id = 'chatHeader';
      chatPane.appendChild(headerDiv);

      updateChatHeader(conversation);

      // 2. Messages Frame
      const messagesArea = document.createElement('div');
      messagesArea.className = 'messages-area';
      messagesArea.id = 'chatMessagesArea';
      messagesArea.innerHTML = '<p style="text-align: center; opacity: 0.4; padding: 20px;">Loading messages...</p>';
      chatPane.appendChild(messagesArea);

      // 3. Bottom Action Bar (Input or Request Banner)
      const bottomBar = document.createElement('div');
      bottomBar.id = 'chatBottomBar';
      chatPane.appendChild(bottomBar);

      updateChatBottomBar(conversation);
    }

    function updateChatHeader(conversation) {
      const headerDiv = document.getElementById('chatHeader');
      if (!headerDiv) return;

      let statusText = '';
      let statusColor = '';
      if (conversation.status === 'accepted') {
        statusText = 'Accepted';
        statusColor = '#34d399';
      } else if (conversation.status === 'declined') {
        statusText = 'Declined';
        statusColor = '#ef4444';
      } else {
        statusText = 'Pending';
        statusColor = '#fbbf24';
      }

      headerDiv.innerHTML = `
        <div class="chat-header-user">
          <div class="conv-avatar" style="width: 40px; height: 40px; cursor: pointer;" onclick="window.location.href='/profile.html?id=${encodeURIComponent(conversation.other_user_id || conversation.other_id)}'">
            ${conversation.other_pic ? `<img src="${conversation.other_pic}" alt="${conversation.other_name || 'User avatar'}">` : (conversation.other_name ? conversation.other_name.charAt(0).toUpperCase() : '👤')}
          </div>
          <div>
            <div class="chat-header-name" style="cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="window.location.href='/profile.html?id=${encodeURIComponent(conversation.other_user_id || conversation.other_id)}'">
              <span>${escapeHtml(conversation.other_name)}</span>
              <span style="font-size: 0.72rem; font-weight: bold; background: ${statusColor}22; color: ${statusColor}; border: 1px solid ${statusColor}44; padding: 1px 6px; border-radius: 8px; text-transform: uppercase;">${statusText}</span>
            </div>
            <div class="chat-header-tag">${escapeHtml(conversation.other_user_id || `ID: ${conversation.other_id}`)}</div>
          </div>
        </div>
        <div>
          ${conversation.id ? `<button class="btn btn--secondary btn--sm" onclick="deleteConversationPermanently(${conversation.id})" style="border-color: rgba(255,94,94,0.3); color: #ff5e5e;">Delete Chat</button>` : ''}
        </div>
      `;
    }

    function updateChatBottomBar(conversation) {
      const bottomBar = document.getElementById('chatBottomBar');
      if (!bottomBar) return;

      bottomBar.innerHTML = '';

      if (conversation.id === null) {
        const requestDiv = document.createElement('div');
        requestDiv.className = 'request-banner';
        requestDiv.innerHTML = `
          <div class="request-banner-title">Send Chat Request?</div>
          <div class="request-banner-desc">You must send a chat request to communicate with ${escapeHtml(conversation.other_name)}.</div>
          <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
            <button class="btn btn--primary btn--sm" onclick="sendChatRequest(${conversation.other_id})">Send Request</button>
            <button class="btn btn--secondary btn--sm" onclick="cancelChatRequest('${conversation.other_user_id || conversation.other_id}')">Cancel</button>
          </div>
        `;
        bottomBar.appendChild(requestDiv);
        return;
      }

      if (conversation.status === 'pending') {
        const isInitiator = Number(conversation.initiated_by_id) === Number(currentUser.id);
        const requestDiv = document.createElement('div');
        requestDiv.className = 'request-banner';
        
        if (isInitiator) {
          requestDiv.innerHTML = `
            <div class="request-banner-title">Waiting for Acceptance</div>
            <div class="request-banner-desc">Your chat request has been sent.</div>
          `;
        } else {
          requestDiv.innerHTML = `
            <div class="request-banner-title">Chat Request</div>
            <div class="request-banner-desc">${escapeHtml(conversation.other_name)} wants to communicate.</div>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
              <button class="btn btn--primary btn--sm" onclick="acceptChat(${conversation.id})">Accept Request</button>
              <button class="btn btn--secondary btn--sm" onclick="declineChat(${conversation.id})" style="border-color: rgba(255,94,94,0.3); color: #ff5e5e;">Decline</button>
            </div>
          `;
        }
        bottomBar.appendChild(requestDiv);
      } else if (conversation.status === 'declined') {
        const requestDiv = document.createElement('div');
        requestDiv.className = 'request-banner';
        requestDiv.style.background = 'rgba(239, 68, 68, 0.08)';
        requestDiv.style.borderColor = 'rgba(239, 68, 68, 0.2)';
        
        const isInitiator = Number(conversation.initiated_by_id) === Number(currentUser.id);
        if (isInitiator) {
          requestDiv.innerHTML = `
            <div class="request-banner-title" style="color: #ef4444;">Chat Request Declined</div>
            <div class="request-banner-desc">Your chat request was declined by the user.</div>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
              <button class="btn btn--primary btn--sm" onclick="sendChatRequest(${conversation.other_id})">Send Request Again</button>
            </div>
          `;
        } else {
          requestDiv.innerHTML = `
            <div class="request-banner-title" style="color: #ef4444;">Chat Request Declined</div>
            <div class="request-banner-desc">You declined this chat request. Accept again?</div>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
              <button class="btn btn--primary btn--sm" onclick="acceptChat(${conversation.id})">Accept Again</button>
            </div>
          `;
        }
        bottomBar.appendChild(requestDiv);
      } else {
        if (bottomBar.querySelector('.chat-input-bar')) return; // Prevent overwriting existing input
        bottomBar.innerHTML = ''; // Clear other banners
        
        const inputBar = document.createElement('div');
        inputBar.className = 'chat-input-bar';
        inputBar.innerHTML = `
          <form class="chat-form" onsubmit="event.preventDefault(); sendMessage();">
            <input type="text" id="chatMessageInput" class="chat-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="btn btn--primary" style="border-radius: 30px; padding: 10px 24px;">Send</button>
          </form>
        `;
        bottomBar.appendChild(inputBar);
        setTimeout(() => {
          const input = document.getElementById('chatMessageInput');
          if (input) input.focus();
        }, 50);
      }
    }

    function renderMessagesOnly(messages) {
      const messagesArea = document.getElementById('chatMessagesArea');
      if (!messagesArea) return;

      // Avoid reflow if no new messages exist
      if (messages.length === lastMessagesCount && messagesArea.innerHTML !== '') return;
      lastMessagesCount = messages.length;

      if (messages.length === 0) {
        messagesArea.innerHTML = `<p style="text-align: center; opacity: 0.4; padding: 20px;">No messages yet.</p>`;
        return;
      }

      messagesArea.innerHTML = messages.map(m => {
        const isSent = Number(m.sender_id) === Number(currentUser.id);
        return `
          <div class="msg-row ${isSent ? 'sent' : 'received'}">
            <div class="msg-bubble">
              <div>${escapeHtml(m.body)}</div>
              <span class="msg-time">${new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
          </div>
        `;
      }).join('');

      setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 50);
    }

    async function sendMessage() {
      const input = document.getElementById('chatMessageInput');
      const body = input.value.trim();
      if (!body || !activeConversation) return;
      input.value = '';
      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ receiver_id: activeConversation.other_id, body })
        });
        if (res.ok) {
          if (activeConversation.id === null) {
            await loadConversations();
            const matching = allConversations.find(c => Number(c.other_id) === Number(activeConversation.other_id));
            if (matching) {
              selectConversation(matching);
            }
          } else {
            loadMessages();
            loadConversations();
          }
        }
      } catch (err) { alert('An error occurred.'); }
    }

    async function acceptChat(convId) {
      try {
        const res = await fetch(`/api/conversations/${convId}/accept`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          await loadConversations();
          if (activeConversation && activeConversation.id === convId) {
            // Update the local status first
            activeConversation.status = 'accepted';
            // Find the refreshed conversation from the updated list
            const refreshed = allConversations.find(c => c.id === convId);
            const merged = refreshed ? { ...activeConversation, ...refreshed } : { ...activeConversation };
            merged.status = 'accepted';
            // Immediately redraw header badge and bottom bar (shows message input)
            updateChatHeader(merged);
            updateChatBottomBar(merged);
            // Also refresh messages
            loadMessages();
          }
        }
      } catch (err) { alert('An error occurred.'); }
    }

    async function declineChat(convId) {
      try {
        const res = await fetch(`/api/conversations/${convId}/decline`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          await loadConversations();
          if (activeConversation && activeConversation.id === convId) {
            activeConversation.status = 'declined';
            const refreshed = allConversations.find(c => c.id === convId);
            const merged = refreshed ? { ...activeConversation, ...refreshed } : { ...activeConversation };
            merged.status = 'declined';
            updateChatHeader(merged);
            updateChatBottomBar(merged);
            loadMessages();
          }
        }
      } catch (err) { alert('An error occurred.'); }
    }

    async function deleteConversationPermanently(convId) {
      if (!confirm('Are you sure you want to permanently delete this chat? This will remove all messages.')) return;
      try {
        const res = await fetch(`/api/conversations/${convId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          activeConversation = null;
          document.getElementById('chatPane').innerHTML = `
            <div class="empty-chat-state">
              <div class="empty-chat-icon">💬</div>
              <p>Select a conversation to start messaging</p>
            </div>
          `;
          if (messagePollInterval) clearInterval(messagePollInterval);
          loadConversations();
        }
      } catch (err) { alert('An error occurred.'); }
    }

    async function sendChatRequest(otherId) {
      try {
        const res = await fetch('/api/conversations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ receiver_id: otherId })
        });
        if (res.ok) {
          const newConv = await res.json();
          await loadConversations();
          selectConversation(newConv);
        } else {
          const err = await res.json();
          alert(err.error || 'Failed to send chat request.');
        }
      } catch (err) { alert('An error occurred.'); }
    }

    function cancelChatRequest(otherIdOrUserId) {
      window.location.href = '/profile.html?id=' + encodeURIComponent(otherIdOrUserId);
    }

    async function openUserChat(userId) {
      const existing = allConversations.find(c => Number(c.other_id) === Number(userId));
      if (existing) { selectConversation(existing); return; }
      try {
        const res = await fetch(`/api/users/${userId}`);
        if (!res.ok) return;
        const otherUser = await res.json();
        const placeholderConv = { id: null, other_id: otherUser.id, other_name: otherUser.full_name, other_pic: otherUser.profile_pic, status: 'pending', initiated_by_id: currentUser.id };
        activeConversation = placeholderConv;
        renderChatLayout(placeholderConv);
        renderMessagesOnly([]);
      } catch (err) { console.error('Failed to initiate user chat:', err); }
    }

    function switchChatTab(tabId, tabName) {
      activeTab = tabName;
      document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      renderConversations();
    }

    document.getElementById('tabActiveChats').addEventListener('click', () => switchChatTab('tabActiveChats', 'active'));
    document.getElementById('tabRequestsChats').addEventListener('click', () => switchChatTab('tabRequestsChats', 'requests'));
    document.getElementById('tabSentChats').addEventListener('click', () => switchChatTab('tabSentChats', 'sent'));
    document.getElementById('tabDeclinedChats').addEventListener('click', () => switchChatTab('tabDeclinedChats', 'declined'));

    loadConversations();
  </script>
</body>
</html>
