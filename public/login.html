<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Midnight Stories</title>
  <meta name="description" content="Log in to your Midnight Stories account to securely share stories, connect with the community, and manage your anonymous profile.">
  <link rel="canonical" href="https://midnightstories.dpdns.org/login.html" />
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background-color: var(--ms-bg) !important;
      color: var(--ms-text) !important;
      font-family: var(--font-primary) !important;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      max-width: 420px;
      width: 100%;
      margin: 40px auto;
      padding: 36px;
      background: var(--ms-surface);
      border: 1px solid var(--ms-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .auth-container:hover {
      border-color: var(--ms-accent);
      box-shadow: 0 4px 20px var(--ms-accent-glow-sm);
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .auth-input {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--ms-border);
      background: var(--bg-input);
      color: var(--ms-text);
      font-family: var(--font-primary);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      outline: none;
    }
    .auth-input:focus {
      border-color: var(--ms-accent);
      box-shadow: 0 0 10px var(--ms-accent-glow-sm);
      background: var(--bg-input-focus);
    }
    .auth-btn {
      padding: 0.85rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      border: none;
      font-family: var(--font-primary);
      transition: all var(--transition-fast);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--ms-accent);
      color: var(--ms-bg);
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-google {
      background: var(--ms-surface);
      color: var(--ms-text-secondary);
      border: 1px solid var(--ms-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }
    .btn-google:hover {
      border-color: var(--ms-accent);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ms-text);
    }
    .auth-links {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9em;
      color: var(--ms-text-secondary);
    }
    .auth-links a {
      color: var(--ms-accent);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="auth-container card glass">
      <h1 style="text-align:center; margin-bottom: 2rem; font-size: 1.5rem;">Welcome Back</h1>
      <form id="loginForm" class="auth-form">
        <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
        <input type="password" id="password" class="auth-input" placeholder="Password" required>
        <button type="submit" class="auth-btn btn-primary">Login</button>
      </form>
      
      <div style="text-align:center; margin: 1.5rem 0; opacity: 0.5;">— or —</div>
      
      <a href="/api/auth/google" class="auth-btn btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>

      <div class="auth-links">
        Don't have an account? <a href="/signup">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('redirect') || '/';
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('An error occurred during login.');
      }
    });
  </script>
</body>
</html>
