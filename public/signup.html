<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Midnight Stories</title>
  <meta name="description" content="Join Midnight Stories to share your experiences, connect with our supportive community, and maintain complete anonymity.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://midnightstories.dpdns.org/signup">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Cropper.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    body {
      background-color: var(--ms-bg) !important;
      color: var(--ms-text) !important;
      font-family: var(--font-primary) !important;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      max-width: 460px;
      width: 100%;
      margin: 40px auto;
      padding: 36px;
      background: var(--ms-surface);
      border: 1px solid var(--ms-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .auth-container:hover {
      border-color: var(--ms-accent);
      box-shadow: 0 4px 20px var(--ms-accent-glow-sm);
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .auth-input {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--ms-border);
      background: var(--bg-input);
      color: var(--ms-text);
      font-family: var(--font-primary);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      outline: none;
    }
    .auth-input:focus {
      border-color: var(--ms-accent);
      box-shadow: 0 0 10px var(--ms-accent-glow-sm);
      background: var(--bg-input-focus);
    }
    .auth-btn {
      padding: 0.85rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      border: none;
      font-family: var(--font-primary);
      transition: all var(--transition-fast);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--ms-accent);
      color: var(--ms-bg);
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-google {
      background: var(--ms-surface);
      color: var(--ms-text-secondary);
      border: 1px solid var(--ms-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }
    .btn-google:hover {
      border-color: var(--ms-accent);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ms-text);
    }
    .auth-links {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9em;
      color: var(--ms-text-secondary);
    }
    .auth-links a {
      color: var(--ms-accent);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
    .signup-dropzone {
      border: 2px dashed var(--ms-border) !important;
      border-radius: var(--radius-sm) !important;
      padding: 1.25rem !important;
      text-align: center !important;
      cursor: pointer !important;
      transition: border-color var(--transition-fast), background-color var(--transition-fast) !important;
      background: rgba(255, 255, 255, 0.01) !important;
      color: var(--ms-text-secondary) !important;
    }
    .signup-dropzone:hover, .signup-dropzone.dragover {
      border-color: var(--ms-accent) !important;
      background: var(--ms-accent-glow) !important;
      color: var(--ms-text) !important;
    }
    .signup-preview {
      display: flex !important;
      align-items: center !important;
      gap: 12px !important;
      padding: 10px !important;
      border: 1px solid var(--ms-border) !important;
      border-radius: var(--radius-sm) !important;
      background: rgba(255, 255, 255, 0.01) !important;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="auth-container card glass">
      <h1 style="text-align:center; margin-bottom: 2rem; font-size: 1.5rem; font-family: 'Fraunces', serif;">Join Midnight Stories</h1>
      <form id="signupForm" class="auth-form" enctype="multipart/form-data">
        <input type="text" id="fullname" class="auth-input" placeholder="Full Name" required>
        <input type="text" id="userid" class="auth-input" placeholder="Custom User ID (optional, e.g. USER_XYZ)" pattern="^[a-zA-Z0-9_]{3,20}$" title="3-20 characters, alphanumeric and underscores only">
        <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
        <input type="tel" id="phone" class="auth-input" placeholder="Phone Number (optional)">
        
        <div style="display:flex; flex-direction:column; gap: 4px;">
          <label style="font-size:0.85rem; opacity:0.8; margin-left:4px;">Date of Birth</label>
          <input type="date" id="dob" class="auth-input" required>
        </div>
        
        <input type="password" id="password" class="auth-input" placeholder="Password (min 6 chars)" required minlength="6">
        
        <!-- Profile Picture Upload (Optional) -->
        <div style="display:flex; flex-direction:column; gap: 4px;">
          <label style="font-size:0.85rem; opacity:0.8; margin-left:4px;">Profile Picture (Optional)</label>
          <div id="signupFileDropzone" class="signup-dropzone">
            <div style="font-size: 1.5rem; margin-bottom: 6px;">📷</div>
            <p style="margin: 0; font-size: 0.85rem; opacity: 0.8;">Click to upload profile photo</p>
            <p style="margin: 4px 0 0 0; font-size: 0.72rem; opacity: 0.5;">JPG, PNG, or WebP (max 5MB)</p>
            <input type="file" id="signupFileInput" accept=".jpg,.jpeg,.png,.webp" style="display:none;">
          </div>
          <div id="signupFilePreview" class="signup-preview" style="display: none;">
            <img id="signupPreviewImage" src="" alt="Preview" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1);">
            <div style="flex: 1; min-width: 0; font-size: 0.8rem;">
              <p id="signupFileName" style="margin: 0; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></p>
              <p id="signupFileSize" style="margin: 2px 0 0 0; opacity: 0.6; font-size: 0.72rem;"></p>
            </div>
            <button type="button" id="signupRemoveFile" style="background: none; border: none; color: #ff5e5e; font-size: 0.8rem; cursor: pointer; padding: 4px;">✕ Remove</button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="auth-btn btn-primary" style="margin-top: 0.5rem;">Create Account</button>
      </form>
      
      <div style="text-align:center; margin: 1.5rem 0; opacity: 0.5;">— or —</div>
      
      <a href="/api/auth/google" class="auth-btn btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </a>

      <div class="auth-links">
        Already have an account? <a href="/login">Login</a>
      </div>
    </div>
  </div>

  <!-- Cropper Modal -->
  <div id="cropperModal" style="display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 20px;">
    <div style="background: #121212; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 100%; max-width: 400px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
      <h2 style="margin-top: 0; margin-bottom: 15px; color: white; text-align: center; font-size: 1.1rem; font-family: inherit;">Crop Profile Picture</h2>
      <div style="max-height: 280px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 8px;">
        <img id="cropperImage" alt="Crop profile photo preview - Midnight Stories portal" style="max-width: 100%; max-height: 280px;">
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
        <button type="button" id="cropperCancelBtn" style="padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: white; font-family: inherit;">Cancel</button>
        <button type="button" id="cropperConfirmBtn" style="padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; border: none; background: var(--primary, #5c6ac4); color: white; font-family: inherit; font-weight: bold;">Crop & Save</button>
      </div>
    </div>
  </div>

  <script>
    let selectedFile = null;
    let cropper = null;

    const dropzone = document.getElementById('signupFileDropzone');
    const fileInput = document.getElementById('signupFileInput');
    const preview = document.getElementById('signupFilePreview');
    const previewImage = document.getElementById('signupPreviewImage');
    const fileName = document.getElementById('signupFileName');
    const fileSize = document.getElementById('signupFileSize');
    const removeBtn = document.getElementById('signupRemoveFile');

    dropzone.addEventListener('click', () => fileInput.click());

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        handleFile(fileInput.files[0]);
      }
    });

    removeBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      preview.style.display = 'none';
      dropzone.style.display = 'block';
    });

    function handleFile(file) {
      const allowed = ['image/jpeg', 'image/png', 'image/webp'];
      if (!allowed.includes(file.type)) {
        alert('Only JPG, PNG, and WebP images are allowed.');
        fileInput.value = '';
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        alert('File must be under 5MB.');
        fileInput.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = (event) => {
        const cropperModal = document.getElementById('cropperModal');
        const cropperImage = document.getElementById('cropperImage');
        cropperImage.src = event.target.result;
        cropperModal.style.display = 'flex';

        if (cropper) cropper.destroy();
        cropper = new Cropper(cropperImage, {
          aspectRatio: 1,
          viewMode: 1,
          autoCropArea: 1,
        });

        document.getElementById('cropperConfirmBtn').onclick = () => {
          const canvas = cropper.getCroppedCanvas({
            width: 300,
            height: 300
          });

          canvas.toBlob((blob) => {
            if (!blob) return;
            selectedFile = new File([blob], file.name, { type: 'image/jpeg' });
            
            previewImage.src = canvas.toDataURL('image/jpeg');
            fileName.textContent = file.name;
            fileSize.textContent = `${(selectedFile.size / 1024).toFixed(1)} KB`;
            preview.style.display = 'flex';
            dropzone.style.display = 'none';

            cropperModal.style.display = 'none';
            cropper.destroy();
            cropper = null;
          }, 'image/jpeg');
        };

        document.getElementById('cropperCancelBtn').onclick = () => {
          cropperModal.style.display = 'none';
          cropper.destroy();
          cropper = null;
          fileInput.value = '';
        };
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const full_name = document.getElementById('fullname').value;
      const user_id = document.getElementById('userid').value.trim() || '';
      const email = document.getElementById('email').value;
      const phone_number = document.getElementById('phone').value.trim() || '';
      const dob = document.getElementById('dob').value || '';
      const password = document.getElementById('password').value;

      if (dob) {
        const today = new Date();
        const birthDate = new Date(dob);
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }
        if (age < 18) {
          alert('You must be 18 years or older to create an account.');
          return;
        }
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';

      try {
        const formData = new FormData();
        formData.append('full_name', full_name);
        if (user_id) formData.append('user_id', user_id);
        formData.append('email', email);
        if (phone_number) formData.append('phone_number', phone_number);
        formData.append('dob', dob);
        formData.append('password', password);
        if (selectedFile) {
          formData.append('profile_pic', selectedFile);
        }

        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('redirect') || '/';
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('An error occurred during signup.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
