<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Midnight Stories</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; padding: 2rem; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-input { padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: inherit; }
    .auth-btn { padding: 0.75rem; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; }
    .btn-primary { background: var(--primary, #5c6ac4); color: white; }
    .btn-google { background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
    .auth-links { text-align: center; margin-top: 1rem; font-size: 0.9em; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="auth-container card glass">
      <h2 style="text-align:center; margin-bottom: 2rem;">Join Midnight Stories</h2>
      <form id="signupForm" class="auth-form">
        <input type="text" id="fullname" class="auth-input" placeholder="Full Name" required>
        <input type="text" id="userid" class="auth-input" placeholder="Custom User ID (optional, e.g. USER_XYZ)" pattern="^[a-zA-Z0-9_]{3,20}$" title="3-20 characters, alphanumeric and underscores only">
        <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
        <input type="tel" id="phone" class="auth-input" placeholder="Phone Number (optional)">
        <div style="display:flex; flex-direction:column; gap: 4px;">
          <label style="font-size:0.85rem; opacity:0.8; margin-left:4px;">Date of Birth</label>
          <input type="date" id="dob" class="auth-input" required>
        </div>
        <input type="password" id="password" class="auth-input" placeholder="Password (min 6 chars)" required minlength="6">
        <button type="submit" class="auth-btn btn-primary">Create Account</button>
      </form>
      
      <div style="text-align:center; margin: 1.5rem 0; opacity: 0.5;">— or —</div>
      
      <a href="/api/auth/google" class="auth-btn btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </a>

      <div class="auth-links">
        Already have an account? <a href="/login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const full_name = document.getElementById('fullname').value;
      const user_id = document.getElementById('userid').value.trim() || null;
      const email = document.getElementById('email').value;
      const phone_number = document.getElementById('phone').value.trim() || null;
      const dob = document.getElementById('dob').value || null;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, email, password, phone_number, dob, user_id })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          alert(data.error);
        }
      } catch (err) {
        alert('An error occurred during signup.');
      }
    });
  </script>
</body>
</html>
