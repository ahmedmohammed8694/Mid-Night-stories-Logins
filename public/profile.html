<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - Midnight Stories</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .profile-header { display: flex; align-items: center; gap: 20px; padding: 2rem; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 2rem; }
    .avatar { width: 100px; height: 100px; border-radius: 50%; background: #5c6ac4; color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .profile-info h1 { margin: 0; }
    .stats { display: flex; gap: 20px; margin-top: 10px; opacity: 0.8; }
    
    .tabs { display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; opacity: 0.7; }
    .tab.active { border-bottom: 2px solid var(--primary, #5c6ac4); opacity: 1; font-weight: bold; }
    
    .story-list { display: flex; flex-direction: column; gap: 15px; }
    .story-item { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Header Placeholder -->
    <header class="header"><div class="header__inner"><a href="/" class="header__logo">Home</a></div></header>

    <main class="page-content">
      <div class="container">
        
        <div class="profile-header">
          <div class="avatar" id="avatar">👤</div>
          <div class="profile-info">
            <h1 id="userName">Loading...</h1>
            <p id="userBio"></p>
            <div class="stats">
              <span id="followersCount">0 Followers</span>
              <span id="followingCount">0 Following</span>
            </div>
            <button id="followBtn" class="btn btn--primary btn--sm" style="display:none; margin-top:10px;">Follow</button>
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" data-tab="stories">Stories Written</div>
          <div class="tab" data-tab="liked">Liked Stories</div>
        </div>

        <div id="storiesContainer" class="story-list">
          <p>Loading stories...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
    const token = localStorage.getItem('token');
    
    const targetUserId = userId || (currentUser ? currentUser.id : null);

    if (!targetUserId) {
      window.location.href = '/login';
    }

    async function loadProfile() {
      const res = await fetch(`/api/users/${targetUserId}`);
      if (!res.ok) return alert('Profile not found');
      
      const user = await res.json();
      document.getElementById('userName').innerText = user.full_name;
      document.getElementById('userBio').innerText = user.bio || 'No bio provided.';
      document.getElementById('followersCount').innerText = `${user.followers_count} Followers`;
      document.getElementById('followingCount').innerText = `${user.following_count} Following`;
      
      if (user.profile_pic) {
        document.getElementById('avatar').innerHTML = `<img src="${user.profile_pic}" style="width:100%; border-radius:50%">`;
      } else {
        document.getElementById('avatar').innerText = user.full_name.charAt(0).toUpperCase();
      }

      if (currentUser && currentUser.id != targetUserId) {
        const followBtn = document.getElementById('followBtn');
        followBtn.style.display = 'block';
        followBtn.innerText = user.is_following ? 'Unfollow' : 'Follow';
        
        // Remove old event listeners
        const newBtn = followBtn.cloneNode(true);
        followBtn.parentNode.replaceChild(newBtn, followBtn);
        
        newBtn.addEventListener('click', async () => {
          const fRes = await fetch(`/api/users/${targetUserId}/follow`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (fRes.ok) {
            const data = await fRes.json();
            newBtn.innerText = data.following ? 'Unfollow' : 'Follow';
            loadProfile(); // reload stats
          }
        });
      }
      
      loadStories('me');
    }

    async function loadStories(type) {
      document.getElementById('storiesContainer').innerHTML = '<p>Loading...</p>';
      
      const endpoint = type === 'me' 
        ? `/api/stories?feed=me&userId=${targetUserId}` 
        : `/api/stories?feed=liked&userId=${targetUserId}`;
        
      const res = await fetch(endpoint, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
      });
      const data = await res.json();
      
      if (data.stories.length === 0) {
        document.getElementById('storiesContainer').innerHTML = '<p>No stories found.</p>';
        return;
      }

      document.getElementById('storiesContainer').innerHTML = data.stories.map(s => `
        <div class="story-item">
          <h3>${s.title || 'Untitled'}</h3>
          <p>${s.content.substring(0, 100)}...</p>
          <small>❤️ ${s.likes_count}</small>
        </div>
      `).join('');
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tabType = e.target.getAttribute('data-tab') === 'stories' ? 'me' : 'liked';
        loadStories(tabType);
      });
    });

    loadProfile();
  </script>
</body>
</html>
