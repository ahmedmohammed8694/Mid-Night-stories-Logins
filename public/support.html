<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Center | Midnight Stories</title>
  <meta name="description" content="Manage your support tickets and communicate with the Midnight Stories administration team.">
  <link rel="canonical" href="https://midnightstories.dpdns.org/support">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .support-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .ticket-list { background: var(--bg-card); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border-card); overflow-y: auto; max-height: 70vh; }
    .ticket-item { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s; border-radius: 8px; margin-bottom: 0.5rem; }
    .ticket-item:hover { background: rgba(255,255,255,0.05); }
    .ticket-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--primary); }
    .ticket-id { font-weight: bold; color: var(--text-primary); font-family: monospace; font-size: 1.1rem; }
    .ticket-status { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 12px; display: inline-block; margin-top: 0.5rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .status-open { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
    .status-investigating { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
    .status-waiting_on_user { background: rgba(230, 126, 34, 0.2); color: #e67e22; }
    .status-resolved { background: rgba(52, 152, 219, 0.2); color: #3498db; }
    .status-closed { background: rgba(149, 165, 166, 0.2); color: #95a5a6; }
    
    .ticket-view { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-card); display: flex; flex-direction: column; height: 70vh; }
    .ticket-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .ticket-messages { flex-grow: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .message-bubble { max-width: 80%; padding: 1rem; border-radius: 12px; position: relative; }
    .msg-admin { background: rgba(92, 106, 196, 0.15); border: 1px solid rgba(92, 106, 196, 0.3); align-self: flex-start; border-top-left-radius: 4px; }
    .msg-user { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-self: flex-end; border-top-right-radius: 4px; }
    .msg-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; display: flex; justify-content: space-between; gap: 1rem; }
    .msg-author { font-weight: bold; color: var(--text-primary); }
    .msg-admin .msg-author { color: var(--primary); }
    .msg-body { color: var(--text-secondary); white-space: pre-wrap; font-size: 0.95rem; line-height: 1.5; }
    
    .ticket-reply { padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
    .ticket-reply.disabled { display: none; }
    .ticket-reply-notice { display: none; padding: 1.5rem; text-align: center; color: var(--text-muted); background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.95rem; }
    
    @media(max-width: 768px) {
      .support-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-theme="dark">
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo">Midnight Stories</a>
      <div class="navbar__links" id="navLinks"></div>
    </div>
  </nav>

  <main class="page-wrapper" style="padding-top: 80px;">
    <h1 style="text-align: center; font-family: 'Fraunces', serif; color: var(--text-primary);">Support Center</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Track and manage your submitted reports</p>
    
    <div class="support-layout">
      <!-- Sidebar List -->
      <aside class="ticket-list" id="ticketList">
        <div class="empty-state">Loading tickets...</div>
      </aside>

      <!-- Main View -->
      <section class="ticket-view hidden" id="ticketView">
        <div class="ticket-header">
          <h2 id="viewTicketId" style="margin: 0; font-family: monospace; font-size: 1.5rem; color: var(--text-primary);"></h2>
          <div id="viewTicketReason" style="color: var(--text-secondary); margin-top: 0.5rem;"></div>
          <div id="viewTicketStatus" class="ticket-status" style="margin-top: 1rem;"></div>
        </div>
        
        <div class="ticket-messages" id="ticketMessages">
          <!-- Messages will be injected here -->
        </div>

        <div id="resolvedNotice" class="ticket-reply-notice">
          This ticket has been marked resolved. If you require additional help, please submit a new report.
        </div>

        <div class="ticket-reply" id="ticketReplyBox">
          <textarea id="replyText" class="form__input" placeholder="Provide additional updates to the Admin team..." rows="3" style="width: 100%; resize: vertical; border-radius: 8px; background: rgba(255,255,255,0.05); color: white; padding: 12px; border: 1px solid rgba(255,255,255,0.1); outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"></textarea>
          <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
            <button class="btn btn--primary" id="replyBtn">Send Update</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/support.js"></script>
</body>
</html>
