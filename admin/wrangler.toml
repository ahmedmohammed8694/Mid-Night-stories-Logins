# admin/wrangler.toml — Cloudflare Worker for Admin Panel
# Deploys to: https://admin.midnightstories.dpdns.org/

name = "midnight-stories-admin"
main = "src/worker.js"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]

# routes = [
#   { pattern = "admin.midnightstories.dpdns.org/*", zone_name = "dpdns.org" }
# ]

# ── Serve admin static files from public/ directory ──
[assets]
directory = "public"

# ── Cloudflare D1 Database (SAME as public site) ──
[[d1_databases]]
binding = "DB"
database_name = "midnight-stories-login-db"
database_id = "48095d8e-c182-4ba3-a285-81eddbc3beb9"

# ── Cloudflare R2 Object Storage (for admin uploaded images if needed) ──
[[r2_buckets]]
binding = "ADMIN_ASSETS"
bucket_name = "midnight-stories-admin-assets"
